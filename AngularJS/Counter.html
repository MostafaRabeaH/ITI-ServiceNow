<!DOCTYPE html>
<html ng-app="Module1">
<head>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body ng-controller="Ctrl1" class="container mt-5">

   <count counts="count1"></count>
 

<script>
(function(){
    var mod = angular.module('Module1', []);

    mod.controller("Ctrl1", function($scope){
        $scope.count1 = 0; 
    });

    mod.directive("count", function() {
        return {
            restrict: 'E',
            scope: {
                counts: "=" 
            },
            template: `
                <div class="card p-4 text-center mx-auto shadow-sm" style="max-width: 300px;">
                    <h3>Count: {{counts}}</h3>
                    <div class="d-flex justify-content-center gap-2 mt-3">
                        <button class="btn btn-danger" ng-click="decrement()">Decrement</button>
                        <button class="btn btn-success" ng-click="increment()">Increment</button>
                    </div>
                </div>
            `,
            link: function(scope) {
                scope.increment = function() {
                    scope.counts++;
                };
                scope.decrement = function() {
                    scope.counts--;
                };
            }
        };
    });
})();
</script>
</body>
</html>
