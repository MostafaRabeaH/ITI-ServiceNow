<!DOCTYPE html>
<html lang="en" ng-app="module1">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-do List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>
</head>
<body class="bg-light">
    
    <div class="container mt-5" style="max-width: 600px;" ng-controller="MainController">
        
        <p class="text-center text-muted mb-3">
            Total tasks: {{ mainTasks.length }}
        </p>

        <todo-list list-title="Daily Tasks" tasks="mainTasks" >  </todo-list>

    </div> 

</body>
<script>
(function(){
    var mod = angular.module('module1', []);

    mod.controller('MainController', function($scope) {
        $scope.mainTasks = []; 
        
  
    });

    mod.directive('todoList', function() {
        return {
            scope: {
                listTitle: '@', 
                tasks: '=',     
             
                
            },
            template: `
                <div class="card shadow-sm p-4">
                    <h2 class="text-center mb-4">{{ listTitle }}</h2>
                    
                    <form name="todoForm" novalidate>
                        <div class="row g-2 mb-4">
                            <div class="col-md-9">
                                <input type="text" class="form-control" ng-model="newTaskName" required placeholder="New task...">
                            </div>
                            <div class="col-md-3">
                                <button class="btn btn-primary w-100 bg-black" ng-click="addTask()" ng-disabled="todoForm.$invalid">
                                    Add 
                                </button>
                            </div>
                        </div>
                    </form>

                    <div class="alert alert-warning text-center bg-black text-danger fw-bold" ng-show="tasks.length === 0">
                        No tasks added yet.
                    </div>

                    <table class="table table-striped table-bordered" ng-show="tasks.length > 0">
                        <thead class="table-dark">
                            <tr>
                                <th style="width: 15%;">Done</th>
                                <th>Task Name</th>
                                <th style="width: 20%;">Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr ng-repeat="task in tasks track by $index">
                                <td class="text-center align-middle">
                                    <input class="form-check-input" type="checkbox" ng-model="task.completed" ">
                                </td>
                                <td class="align-middle" ng-class="{'text-decoration-line-through text-muted': task.completed}">
                                    {{ task.name }}
                                </td>
                                <td>
                                    <button class="btn btn-danger btn-sm w-100" ng-click="removeTask($index)">Delete</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>   
                </div>
            `,
            link: function(scope, element, attrs) {
                scope.newTaskName = "";

                scope.addTask = function() {
                    if (scope.newTaskName) {
                        scope.tasks.push({ 
                            name: scope.newTaskName, 
                            completed: false 
                        });
                        scope.newTaskName = ""; 
                    }
                };

                scope.removeTask = function(index) {
                    scope.tasks.splice(index, 1);
                };

                
            }
        };
    });

})();
</script>
</html>
